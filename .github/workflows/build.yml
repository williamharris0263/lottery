name: Build iOS IPA

on:
  push:
    branches: [ "main" ] # 只要代码推送到 main 分支就触发
  workflow_dispatch:     # 允许你在网页上手动点击运行

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest # 使用最新的云端 Mac
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (Unsigned)
        run: |
          # 强制指定输出目录为 build 文件夹，方便后续打包
          xcodebuild clean build \
            -project LotteryApp.xcodeproj \
            -scheme LotteryApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build
            
      - name: Package into IPA
        run: |
          # 将编译好的 .app 文件按标准 iOS 结构压缩成 .ipa
          mkdir Payload
          cp -r build/LotteryApp.app Payload/
          zip -r LotteryApp.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: LotteryApp-Unsigned
          path: LotteryApp.ipa